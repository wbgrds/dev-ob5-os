<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Olaf Scharfenberg - WEBGUARDS</title>
    <link rel="stylesheet" href="styles.css" />
    <link href="includes/plugins/google/scheduling-button-script.css" rel="stylesheet">
    <style>
      #debug-panel {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #000;
        color: #0f0;
        padding: 10px;
        font-family: monospace;
        font-size: 12px;
        max-height: 150px;
        overflow: auto;
        z-index: 99999;
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="nav-container">
        <div class="nav-logo">WΞBGUΛRDS</div>
        <div class="nav-links">
          <a href="https://1018.3cx.cloud/callus/#olaf" target="_blank" rel="noopener">
            Kontakt
          </a>
        </div>
      </div>
    </nav>

    <header>
      <div class="header-content">
        <div class="header-text">
          <h1>Olaf Scharfenberg</h1>
          <p>IT-Techniker & Gründer</p>
        </div>
        <div class="header-image">
          <img src="olafscharfenberg.png" alt="Olaf Scharfenberg" />
        </div>
      </div>
    </header>

    <section class="about">
      <h2>Über mich</h2>
      <p>
        Ich baue Automatisierungslösungen für Unternehmen — Android-Apps, n8n-Workflows, 
        Custom Tools. Pragmatisch, effizient, fokussiert auf Entlastung.
      </p>
    </section>

    <footer>
      <p>&copy; 2026 WEBGUARDS-DE. All rights reserved.</p>
      <div class="footer-links">
        <a href="https://github.com/wbgrds" target="_blank" rel="noopener">GitHub</a>
        <a href="https://1018.3cx.cloud/callus/#olaf" target="_blank" rel="noopener">
          Kontakt
        </a>
      </div>
      <div id="cal"></div>
    </footer>

    <div id="debug-panel"></div>

    <script>
      const debugLog = [];
      function debug(msg) {
        debugLog.push(msg);
        document.getElementById('debug-panel').textContent = debugLog.join('\n');
      }

      debug('[1] Script startet...');
    </script>

    <script src="includes/plugins/google/scheduling-button-script.js"></script>

    <script>
      debug('[2] Nach Script-Laden: window.calendar = ' + (typeof window.calendar));
      
      document.addEventListener('DOMContentLoaded', function() {
        debug('[3] DOMContentLoaded');
        debug('window.calendar.schedulingButton = ' + (typeof window.calendar?.schedulingButton));
        
        if (window.calendar && window.calendar.schedulingButton) {
          debug('[4] Versuche load() zu starten...');
          try {
            window.calendar.schedulingButton.load({
              target: document.getElementById('cal'),
              url: 'https://cal.com/wbgrds/hotline',
              label: 'Termin',
              color: '#039BE5'
            });
            debug('[5] load() erfolgreich');
          } catch(e) {
            debug('[ERROR] ' + e.message);
          }
        } else {
          debug('[ERROR] window.calendar.schedulingButton existiert nicht');
          debug('window = ' + (typeof window));
          debug('window.calendar = ' + (typeof window.calendar));
        }
      });
    </script>
  </body>
</html>
